<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>西影集团 · 班子行程</title>
<style>
:root {
  --red: #C41E2F;
  --red-dark: #9B1824;
  --bg: #F5F6FA;
  --card: #FFF;
  --text: #1A1A1A;
  --text2: #555;
  --text3: #999;
  --border: #EBEDF0;
  --green: #00B578;
  --orange: #FF8F1F;
  --blue: #1677FF;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--text); min-height:100vh; padding-bottom:30px;
  -webkit-font-smoothing: antialiased;
}

/* Header */
.header {
  background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%);
  color: white; padding: 16px 16px 12px; position:sticky; top:0; z-index:100;
  box-shadow: 0 2px 16px rgba(196,30,47,0.3);
}
.header h1 { font-size:17px; font-weight:600; text-align:center; letter-spacing:3px; }
.header .sub { text-align:center; font-size:11px; opacity:0.6; margin-top:3px; }

/* Date Navigation */
.date-nav {
  background: white; display:flex; align-items:center; justify-content:space-between;
  padding: 10px 12px; border-bottom:1px solid var(--border); position:relative;
}
.date-nav .btn {
  width:36px; height:36px; border-radius:50%; border:1px solid var(--border);
  background:white; display:flex; align-items:center; justify-content:center;
  font-size:16px; color:var(--text2); cursor:pointer;
}
.date-nav .btn:active { background:#f5f5f5; }
.date-nav .center { text-align:center; }
.date-nav .date-main { font-size:17px; font-weight:700; }
.date-nav .date-sub { font-size:12px; color:var(--text3); margin-top:2px; }
.tag { display:inline-block; font-size:10px; padding:1px 6px; border-radius:6px; margin-left:6px; vertical-align:middle; }
.tag-today { background:var(--red); color:white; }
.tag-tomorrow { background:var(--orange); color:white; }
.tag-yesterday { background:var(--text3); color:white; }
.today-btn {
  position:absolute; right:56px; top:50%; transform:translateY(-50%);
  font-size:12px; color:var(--red); border:1px solid var(--red); border-radius:12px;
  padding:2px 10px; cursor:pointer; background:white;
}
.today-btn:active { background: var(--red); color:white; }

/* Week Strip */
.week-strip {
  display:flex; background:white; padding:6px 6px 10px;
  border-bottom:1px solid var(--border); gap:2px;
}
.week-strip .day {
  flex:1; text-align:center; padding:5px 0; border-radius:10px; cursor:pointer;
  transition: all 0.15s; position:relative;
}
.week-strip .day.active { background:var(--red); color:white; }
.week-strip .day.today:not(.active) { background:#FEF0F0; }
.week-strip .day .wd { font-size:10px; color:var(--text3); }
.week-strip .day.active .wd, .week-strip .day.today:not(.active) .wd { color:inherit; opacity:0.7; }
.week-strip .day .dd { font-size:14px; font-weight:600; margin-top:2px; }
.week-strip .day .dot { width:4px; height:4px; border-radius:50%; background:var(--red); margin:3px auto 0; }
.week-strip .day.active .dot { background:white; }

/* Summary */
.day-summary {
  display:flex; justify-content:center; gap:24px; padding:10px;
  font-size:12px; color:var(--text2);
}
.day-summary strong { color:var(--red); font-size:17px; margin-right:2px; }

/* Tab: All / By Leader */
.mode-tabs {
  display:flex; gap:0; margin:10px 12px 0; background:white; border-radius:10px;
  overflow:hidden; border:1px solid var(--border);
}
.mode-tab {
  flex:1; text-align:center; padding:9px 0; font-size:13px; color:var(--text2);
  cursor:pointer; transition:all 0.2s; font-weight:500;
}
.mode-tab.active { background:var(--red); color:white; }

/* Timeline */
.timeline { padding:0 12px; margin-top:10px; }
.timeline-group { margin-bottom:16px; }
.timeline-leader {
  display:flex; align-items:center; gap:8px; margin-bottom:8px; padding:0 4px;
}
.leader-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.leader-name { font-size:14px; font-weight:600; }
.leader-role { font-size:11px; color:var(--text3); }
.leader-count { font-size:11px; color:white; background:var(--red); border-radius:8px; padding:0 6px; margin-left:auto; }

/* Time Bar */
.time-bar {
  background: white; border-radius:10px; overflow:hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04); margin-bottom:4px;
}
.time-slots { display:flex; height:28px; border-radius:8px; overflow:hidden; margin:8px; background:#F5F6FA; }
.time-slot {
  height:100%; display:flex; align-items:center; justify-content:center;
  font-size:9px; font-weight:500; color:white; overflow:hidden; white-space:nowrap;
  transition: all 0.3s;
}
.time-slot.busy { background: var(--red); opacity:0.85; }
.time-slot.free { background: var(--green); opacity:0.25; }
.time-labels { display:flex; justify-content:space-between; padding:0 8px 6px; }
.time-label { font-size:9px; color:var(--text3); }

/* Schedule Items */
.sch-item {
  display:flex; padding:10px 12px; border-bottom:1px solid #F5F5F5;
  gap:10px; align-items:flex-start;
}
.sch-item:last-child { border-bottom:none; }
.sch-time { flex-shrink:0; width:52px; text-align:center; }
.sch-time .t1 { font-size:14px; font-weight:700; color:var(--red); }
.sch-time .t2 { font-size:11px; color:var(--text3); }
.sch-body { flex:1; min-width:0; }
.sch-title { font-size:14px; font-weight:600; line-height:1.4; }
.sch-meta { font-size:12px; color:var(--text2); margin-top:4px; line-height:1.6; }
.sch-notes { font-size:12px; color:var(--text3); margin-top:4px; padding-top:4px; border-top:1px dashed var(--border); line-height:1.5; }
.allday-tag {
  display:inline-block; font-size:11px; background:#FFF7E6; color:#D48806;
  padding:1px 8px; border-radius:4px; font-weight:500;
}

/* Empty */
.empty { text-align:center; padding:50px 20px; color:var(--text3); }
.empty .icon { font-size:40px; margin-bottom:8px; }
.empty .msg { font-size:13px; }

/* Leader Filter */
.leader-filter {
  display:flex; padding:10px 12px 0; gap:6px; overflow-x:auto;
  -webkit-overflow-scrolling:touch;
}
.leader-filter::-webkit-scrollbar { display:none; }
.lf-chip {
  flex-shrink:0; padding:5px 12px; border-radius:16px; font-size:12px;
  border:1px solid var(--border); background:white; color:var(--text2);
  cursor:pointer; transition:all 0.2s; font-weight:500;
}
.lf-chip.active { background:var(--red); color:white; border-color:var(--red); }

.footer { text-align:center; font-size:10px; color:#CCC; padding:16px; }
</style>
</head>
<body>

<div class="header">
  <h1>西影集团 · 班子行程</h1>
  <div class="sub" id="syncTime">数据同步自飞书</div>
</div>

<div class="date-nav">
  <div class="btn" onclick="changeDate(-1)">◀</div>
  <div class="center">
    <div class="date-main" id="dateMain"></div>
    <div class="date-sub" id="dateSub"></div>
  </div>
  <div class="today-btn" id="todayBtn" onclick="goToday()" style="display:none;">回今天</div>
  <div class="btn" onclick="changeDate(1)">▶</div>
</div>

<div class="week-strip" id="weekStrip"></div>
<div class="day-summary" id="daySummary"></div>

<div class="mode-tabs">
  <div class="mode-tab active" id="tabAll" onclick="setMode('all')">按时间</div>
  <div class="mode-tab" id="tabLeader" onclick="setMode('leader')">按领导</div>
</div>

<div id="filterBar"></div>
<div id="content"><div class="loading" style="text-align:center;padding:40px;color:#999;">加载中...</div></div>
<div class="footer">数据来源：飞书多维表格 · 自动同步</div>

<script>
const WD=['日','一','二','三','四','五','六'];
const WORK_S=8*60+30, WORK_E=18*60;
let leaders=[], allData=[], curDate=new Date(), curMode='all', curLeader='all';

async function init(){
  try{ leaders=await(await fetch('/api/leaders')).json(); }catch(e){}
  setDate(new Date());
}

function setDate(d){
  curDate=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  updateDateNav(); updateWeekStrip(); loadData();
}
function changeDate(n){ const d=new Date(curDate); d.setDate(d.getDate()+n); setDate(d); }
function goToday(){ setDate(new Date()); }
function fmt(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

function updateDateNav(){
  const d=curDate, today=new Date(); today.setHours(0,0,0,0);
  const diff=Math.round((d-today)/86400000);
  let tag='';
  if(diff===0) tag='<span class="tag tag-today">今天</span>';
  else if(diff===1) tag='<span class="tag tag-tomorrow">明天</span>';
  else if(diff===-1) tag='<span class="tag tag-yesterday">昨天</span>';
  document.getElementById('dateMain').innerHTML=`${d.getMonth()+1}月${d.getDate()}日${tag}`;
  document.getElementById('dateSub').textContent=`${d.getFullYear()}年 · 星期${WD[d.getDay()]}`;
  document.getElementById('todayBtn').style.display=diff===0?'none':'block';
}

function updateWeekStrip(){
  const strip=document.getElementById('weekStrip'); strip.innerHTML='';
  const d=new Date(curDate), dow=d.getDay()||7;
  const mon=new Date(d); mon.setDate(d.getDate()-dow+1);
  const today=new Date(); today.setHours(0,0,0,0);
  for(let i=0;i<7;i++){
    const day=new Date(mon); day.setDate(mon.getDate()+i);
    const el=document.createElement('div');
    el.className='day'+(day.getTime()===curDate.getTime()?' active':'')+(day.getTime()===today.getTime()?' today':'');
    el.innerHTML=`<div class="wd">${['一','二','三','四','五','六','日'][i]}</div><div class="dd">${day.getDate()}</div>`;
    const dd=new Date(day); el.onclick=()=>setDate(dd);
    strip.appendChild(el);
  }
}

async function loadData(){
  try{
    allData=await(await fetch('/api/schedules')).json();
    document.getElementById('syncTime').textContent='更新: '+new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
    // week dots
    const strip=document.getElementById('weekStrip'), days=strip.querySelectorAll('.day');
    const d=new Date(curDate), dow=d.getDay()||7;
    const mon=new Date(d); mon.setDate(d.getDate()-dow+1);
    days.forEach((el,i)=>{
      const day=new Date(mon); day.setDate(mon.getDate()+i);
      if(allData.some(s=>s.date===fmt(day))&&!el.querySelector('.dot')){
        const dot=document.createElement('div'); dot.className='dot'; el.appendChild(dot);
      }
    });
    render();
  }catch(e){
    document.getElementById('content').innerHTML='<div class="empty"><div class="icon">⚠️</div><div class="msg">加载失败，请刷新重试</div></div>';
  }
}

function setMode(m){
  curMode=m;
  document.getElementById('tabAll').className='mode-tab'+(m==='all'?' active':'');
  document.getElementById('tabLeader').className='mode-tab'+(m==='leader'?' active':'');
  render();
}

function render(){
  const ds=fmt(curDate);
  let items=allData.filter(s=>s.date===ds);
  document.getElementById('daySummary').innerHTML=`
    <div><strong>${items.length}</strong>条行程</div>
    <div><strong>${new Set(items.map(s=>s.leader)).size}</strong>位领导</div>
    <div><strong>${items.filter(s=>s.importance==='高').length}</strong>条重要</div>`;
  if(!items.length){
    document.getElementById('filterBar').innerHTML='';
    document.getElementById('content').innerHTML='<div class="empty"><div class="icon">📭</div><div class="msg">当日暂无行程安排</div></div>';
    return;
  }
  curMode==='all'?renderAll(items):renderLeader(items);
}

function renderAll(items){
  const present=[...new Set(items.map(s=>s.leader))];
  const bar=document.getElementById('filterBar');
  bar.className='leader-filter';
  bar.innerHTML=`<div class="lf-chip ${curLeader==='all'?'active':''}" onclick="setLeaderFilter('all')">全部</div>`+
    present.map(n=>{const l=leaders.find(x=>x.name===n);const c=l?l.color:'#999';
      return `<div class="lf-chip ${curLeader===n?'active':''}" onclick="setLeaderFilter('${n}')" ${curLeader===n?'':`style="border-color:${c};color:${c}"`}>${n}</div>`;
    }).join('');

  let f=curLeader==='all'?items:items.filter(s=>s.leader===curLeader);
  document.getElementById('content').innerHTML='<div class="timeline">'+f.map(s=>{
    const l=leaders.find(x=>x.name===s.leader);const c=l?l.color:'#999';
    return `<div class="time-bar"><div class="sch-item">
      <div class="sch-time">${s.is_allday?'<span class="allday-tag">全天</span>':`<div class="t1">${s.start_time}</div><div class="t2">${s.end_time||''}</div>`}</div>
      <div class="sch-body">
        <div class="sch-title">${s.title}</div>
        <div class="sch-meta"><span style="background:${c}15;color:${c};padding:1px 8px;border-radius:10px;font-size:11px;font-weight:500;">${s.leader}</span>${s.location?' <span style="color:var(--text3)">📍'+s.location+'</span>':''}</div>
        ${s.participants?`<div class="sch-meta">👥 ${s.participants}</div>`:''}
        ${s.notes?`<div class="sch-notes">📝 ${s.notes}</div>`:''}
      </div></div></div>`;
  }).join('')+'</div>';
}

function renderLeader(items){
  document.getElementById('filterBar').innerHTML='';
  const groups={};
  leaders.forEach(l=>{ const s=items.filter(x=>x.leader===l.name); if(s.length)groups[l.name]=s; });

  let h='<div class="timeline">';
  for(const[name,scheds]of Object.entries(groups)){
    const l=leaders.find(x=>x.name===name); const c=l?l.color:'#999';
    h+=`<div class="timeline-group"><div class="timeline-leader">
      <div class="leader-dot" style="background:${c}"></div>
      <div class="leader-name">${name}</div><div class="leader-role">${l?l.role:''}</div>
      <div class="leader-count">${scheds.length}</div></div>`;

    // Time bar
    const busy=scheds.filter(s=>!s.is_allday&&s.start_min!=null).sort((a,b)=>a.start_min-b.start_min);
    const hasAll=scheds.some(s=>s.is_allday);

    if(hasAll){
      h+=`<div class="time-bar"><div style="padding:6px 8px;">
        <div class="time-slots"><div class="time-slot busy" style="flex:1;font-size:10px;">全天忙碌</div></div>
        <div class="time-labels"><div class="time-label">08:30</div><div class="time-label">12:00</div><div class="time-label">18:00</div></div></div>`;
    } else if(busy.length){
      let segs=[], cur=WORK_S;
      busy.forEach(s=>{
        if(s.start_min>cur) segs.push({t:'free',s:cur,e:s.start_min});
        segs.push({t:'busy',s:Math.max(cur,s.start_min),e:s.end_min,title:s.title});
        cur=Math.max(cur,s.end_min);
      });
      if(cur<WORK_E) segs.push({t:'free',s:cur,e:WORK_E});
      const total=WORK_E-WORK_S;
      h+=`<div class="time-bar"><div style="padding:6px 8px;"><div class="time-slots">`;
      segs.forEach(seg=>{
        const pct=((seg.e-seg.s)/total*100).toFixed(1);
        const lb=seg.t==='busy'?(seg.title.length>6?seg.title.slice(0,6)+'…':seg.title):'空闲';
        h+=`<div class="time-slot ${seg.t}" style="flex:${pct}">${pct>8?lb:''}</div>`;
      });
      h+=`</div><div class="time-labels"><div class="time-label">08:30</div><div class="time-label">12:00</div><div class="time-label">18:00</div></div></div>`;
    }

    scheds.forEach(s=>{
      h+=`<div class="sch-item"><div class="sch-time">${s.is_allday?'<span class="allday-tag">全天</span>':`<div class="t1">${s.start_time}</div><div class="t2">${s.end_time||''}</div>`}</div>
        <div class="sch-body"><div class="sch-title">${s.title}</div>
        ${s.location?`<div class="sch-meta">📍 ${s.location}</div>`:''}
        ${s.participants?`<div class="sch-meta">👥 ${s.participants}</div>`:''}
        ${s.notes?`<div class="sch-notes">📝 ${s.notes}</div>`:''}</div></div>`;
    });
    h+='</div></div>';
  }

  // Free leaders
  const free=leaders.filter(l=>!groups[l.name]);
  if(free.length){
    h+='<div style="margin-top:12px;padding:12px;background:white;border-radius:10px;">';
    h+='<div style="font-size:12px;color:var(--text3);margin-bottom:8px;">🟢 以下领导当日暂无行程</div>';
    h+='<div style="display:flex;flex-wrap:wrap;gap:8px;">';
    free.forEach(l=>{h+=`<span style="font-size:12px;padding:3px 10px;border-radius:12px;background:${l.color}10;color:${l.color};font-weight:500;">${l.name}</span>`;});
    h+='</div></div>';
  }
  h+='</div>';
  document.getElementById('content').innerHTML=h;
}

function setLeaderFilter(n){ curLeader=n; render(); }

let touchY=0;
document.addEventListener('touchstart',e=>{touchY=e.touches[0].clientY;});
document.addEventListener('touchend',e=>{if(e.changedTouches[0].clientY-touchY>80&&window.scrollY===0)loadData();});
setInterval(loadData,60000);
init();
</script>
</body>
</html>
