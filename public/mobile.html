<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>西影集团 · 领导行程</title>
<style>
:root {
  --primary: #C41E2F;
  --primary-dark: #9B1824;
  --primary-light: #FDEEF0;
  --gold: #B8860B;
  --bg: #F2F3F5;
  --card: #FFFFFF;
  --text: #1A1A1A;
  --text2: #666;
  --text3: #999;
  --border: #EBEDF0;
  --green: #07C160;
  --orange: #FA9D3B;
  --red: #E4393C;
  --blue: #1989FA;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* Header */
.header {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: white;
  padding: 20px 16px 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(196,30,47,0.25);
}
.header h1 {
  font-size: 18px;
  font-weight: 600;
  text-align: center;
  letter-spacing: 2px;
}
.header .sub {
  text-align: center;
  font-size: 11px;
  opacity: 0.7;
  margin-top: 4px;
}

/* Date Nav */
.date-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px 16px;
  background: white;
  border-bottom: 1px solid var(--border);
  gap: 16px;
}
.date-nav .arrow {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 14px;
  color: var(--text2);
  background: white;
  transition: all 0.2s;
}
.date-nav .arrow:active { background: var(--bg); }
.date-nav .date-text {
  font-size: 16px;
  font-weight: 600;
  min-width: 180px;
  text-align: center;
}
.date-nav .weekday {
  font-size: 13px;
  color: var(--text2);
  font-weight: 400;
}
.date-nav .today-tag {
  font-size: 11px;
  background: var(--primary);
  color: white;
  padding: 1px 6px;
  border-radius: 8px;
  margin-left: 6px;
}

/* Week Strip */
.week-strip {
  display: flex;
  background: white;
  padding: 8px 8px 12px;
  border-bottom: 1px solid var(--border);
  gap: 2px;
}
.week-strip .day {
  flex: 1;
  text-align: center;
  padding: 6px 0;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
}
.week-strip .day.active {
  background: var(--primary);
  color: white;
}
.week-strip .day.today:not(.active) {
  background: var(--primary-light);
  color: var(--primary);
}
.week-strip .day .wd {
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 4px;
}
.week-strip .day.active .wd { color: rgba(255,255,255,0.8); }
.week-strip .day.today:not(.active) .wd { color: var(--primary); }
.week-strip .day .dd {
  font-size: 15px;
  font-weight: 600;
}
.week-strip .day .dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--primary);
  margin: 3px auto 0;
}
.week-strip .day.active .dot { background: white; }

/* Filter */
.filter-bar {
  display: flex;
  padding: 10px 16px;
  gap: 8px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-chip {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  border: 1px solid var(--border);
  background: white;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.2s;
}
.filter-chip.active {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}

/* Content */
.content {
  padding: 0 12px 80px;
}

/* Schedule Card */
.schedule-card {
  background: white;
  border-radius: 12px;
  margin-top: 10px;
  padding: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  position: relative;
  overflow: hidden;
  transition: transform 0.15s;
}
.schedule-card:active { transform: scale(0.98); }
.schedule-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 4px;
}
.schedule-card.imp-high::before { background: var(--red); }
.schedule-card.imp-mid::before { background: var(--orange); }
.schedule-card.imp-low::before { background: var(--green); }

.card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.card-time {
  font-size: 15px;
  font-weight: 700;
  color: var(--primary);
}
.card-leader {
  font-size: 12px;
  padding: 2px 10px;
  border-radius: 12px;
  font-weight: 500;
}
.leader-0 { background: #FEF0F0; color: #E4393C; }
.leader-1 { background: #FFF7E6; color: #D48806; }
.leader-2 { background: #E8F4FD; color: #1677FF; }
.leader-3 { background: #F0FFF0; color: #389E0D; }
.leader-4 { background: #F9F0FF; color: #722ED1; }
.leader-5 { background: #FFF0F6; color: #C41D7F; }
.leader-6 { background: #E6FFFB; color: #13A8A8; }

.card-title {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 8px;
  line-height: 1.4;
}

.card-info {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 16px;
}
.card-info .info-item {
  font-size: 12px;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 4px;
}
.card-info .icon {
  font-size: 13px;
}

.card-notes {
  margin-top: 8px;
  font-size: 12px;
  color: var(--text3);
  padding-top: 8px;
  border-top: 1px dashed var(--border);
  line-height: 1.5;
}

/* Empty State */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
}
.empty .emoji { font-size: 48px; margin-bottom: 12px; }
.empty .msg { font-size: 14px; }

/* Loading */
.loading {
  text-align: center;
  padding: 40px;
  color: var(--text3);
  font-size: 14px;
}
.loading::after {
  content: '';
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-left: 8px;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Refresh Hint */
.refresh-hint {
  text-align: center;
  font-size: 11px;
  color: var(--text3);
  padding: 8px;
}

/* Summary bar */
.summary-bar {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 8px 16px;
  background: white;
  border-bottom: 1px solid var(--border);
}
.summary-item {
  font-size: 12px;
  color: var(--text2);
}
.summary-item strong {
  color: var(--primary);
  font-size: 16px;
  margin-right: 2px;
}
</style>
</head>
<body>

<div class="header">
  <h1>西影集团 · 领导行程</h1>
  <div class="sub">数据同步自飞书 · 下拉刷新</div>
</div>

<div class="date-nav">
  <div class="arrow" onclick="changeDate(-1)">◀</div>
  <div class="date-text" id="dateText"></div>
  <div class="arrow" onclick="changeDate(1)">▶</div>
</div>

<div class="week-strip" id="weekStrip"></div>

<div class="filter-bar" id="filterBar">
  <div class="filter-chip active" data-leader="all" onclick="filterLeader(this)">全部</div>
</div>

<div class="summary-bar" id="summaryBar"></div>

<div class="content" id="content">
  <div class="loading">加载中</div>
</div>

<script>
const WEEKDAYS = ['日','一','二','三','四','五','六'];
const LEADERS = ['赵总','刚总','许书记','肖总','孟总','X书记','闫总'];
let currentDate = new Date();
let currentLeader = 'all';
let allSchedules = [];

// Init
function init() {
  // Build filter chips
  const bar = document.getElementById('filterBar');
  LEADERS.forEach((name, i) => {
    const chip = document.createElement('div');
    chip.className = 'filter-chip';
    chip.dataset.leader = name;
    chip.textContent = name;
    chip.onclick = function() { filterLeader(this); };
    bar.appendChild(chip);
  });

  setDate(new Date());
}

function setDate(d) {
  currentDate = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  updateDateDisplay();
  updateWeekStrip();
  loadSchedules();
}

function changeDate(offset) {
  const d = new Date(currentDate);
  d.setDate(d.getDate() + offset);
  setDate(d);
}

function updateDateDisplay() {
  const d = currentDate;
  const today = new Date();
  const isToday = d.toDateString() === today.toDateString();
  const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
  const isTomorrow = d.toDateString() === tomorrow.toDateString();

  let text = `${d.getMonth()+1}月${d.getDate()}日 <span class="weekday">星期${WEEKDAYS[d.getDay()]}</span>`;
  if (isToday) text += ' <span class="today-tag">今天</span>';
  else if (isTomorrow) text += ' <span class="today-tag" style="background:#FA9D3B">明天</span>';
  document.getElementById('dateText').innerHTML = text;
}

function updateWeekStrip() {
  const strip = document.getElementById('weekStrip');
  strip.innerHTML = '';
  // Find Monday of current week
  const d = new Date(currentDate);
  const dayOfWeek = d.getDay() || 7;
  const monday = new Date(d);
  monday.setDate(d.getDate() - dayOfWeek + 1);

  const today = new Date();
  for (let i = 0; i < 7; i++) {
    const day = new Date(monday);
    day.setDate(monday.getDate() + i);
    const isActive = day.toDateString() === currentDate.toDateString();
    const isToday = day.toDateString() === today.toDateString();

    const el = document.createElement('div');
    el.className = 'day' + (isActive ? ' active' : '') + (isToday ? ' today' : '');
    el.innerHTML = `<div class="wd">${['一','二','三','四','五','六','日'][i]}</div><div class="dd">${day.getDate()}</div>`;
    el.onclick = () => setDate(day);
    strip.appendChild(el);
  }
}

function filterLeader(el) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentLeader = el.dataset.leader;
  renderSchedules();
}

async function loadSchedules() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading">加载中</div>';

  try {
    // Load 7 days around current date for week dots
    const d = currentDate;
    const dayOfWeek = (d.getDay() || 7);
    const monday = new Date(d);
    monday.setDate(d.getDate() - dayOfWeek + 1);
    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);

    const startDate = fmt(monday);
    const endDate = fmt(sunday);

    const resp = await fetch(`/api/schedules?start_date=${startDate}&end_date=${endDate}`);
    allSchedules = await resp.json();

    // Update week strip dots
    updateWeekDots();
    renderSchedules();
  } catch(e) {
    content.innerHTML = '<div class="empty"><div class="emoji">⚠️</div><div class="msg">加载失败，请下拉刷新</div></div>';
  }
}

function updateWeekDots() {
  const days = document.querySelectorAll('.week-strip .day');
  const d = new Date(currentDate);
  const dayOfWeek = (d.getDay() || 7);
  const monday = new Date(d);
  monday.setDate(d.getDate() - dayOfWeek + 1);

  days.forEach((el, i) => {
    const day = new Date(monday);
    day.setDate(monday.getDate() + i);
    const dateStr = fmt(day);
    const hasSchedule = allSchedules.some(s => s.date === dateStr);
    const existingDot = el.querySelector('.dot');
    if (hasSchedule && !existingDot) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      el.appendChild(dot);
    }
  });
}

function renderSchedules() {
  const content = document.getElementById('content');
  const dateStr = fmt(currentDate);

  let items = allSchedules.filter(s => s.date === dateStr);
  if (currentLeader !== 'all') items = items.filter(s => s.leader === currentLeader);

  // Summary
  const allToday = allSchedules.filter(s => s.date === dateStr);
  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-item"><strong>${allToday.length}</strong>条行程</div>
    <div class="summary-item"><strong>${new Set(allToday.map(s=>s.leader)).size}</strong>位领导</div>
  `;

  if (items.length === 0) {
    content.innerHTML = '<div class="empty"><div class="emoji">📭</div><div class="msg">当日暂无行程安排</div></div>';
    return;
  }

  content.innerHTML = items.map(s => {
    const leaderIdx = LEADERS.indexOf(s.leader);
    const impClass = s.importance === '高' ? 'imp-high' : s.importance === '低' ? 'imp-low' : 'imp-mid';
    const leaderClass = leaderIdx >= 0 ? `leader-${leaderIdx}` : 'leader-0';

    let infoHtml = '';
    if (s.location) infoHtml += `<div class="info-item"><span class="icon">📍</span>${s.location}</div>`;
    if (s.participants) infoHtml += `<div class="info-item"><span class="icon">👥</span>${s.participants}</div>`;

    let notesHtml = '';
    if (s.notes) notesHtml = `<div class="card-notes">💡 ${s.notes}</div>`;

    return `
      <div class="schedule-card ${impClass}">
        <div class="card-top">
          <div class="card-time">${s.start_time || ''}${s.end_time ? ' - '+s.end_time : ''}</div>
          <div class="card-leader ${leaderClass}">${s.leader}</div>
        </div>
        <div class="card-title">${s.title}</div>
        ${infoHtml ? `<div class="card-info">${infoHtml}</div>` : ''}
        ${notesHtml}
      </div>
    `;
  }).join('');

  content.innerHTML += '<div class="refresh-hint">数据来源：飞书多维表格 · 实时同步</div>';
}

function fmt(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

// Pull to refresh (simple)
let touchStartY = 0;
document.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; });
document.addEventListener('touchend', e => {
  if (e.changedTouches[0].clientY - touchStartY > 100 && window.scrollY === 0) {
    loadSchedules();
  }
});

// Auto refresh every 60s
setInterval(loadSchedules, 60000);

init();
</script>
</body>
</html>
